# Tmux configuration — chezmoi-managed
# Adopted from sjawhar/dotfiles with persistence + UX polish

# Adapt to most recent client's terminal size (essential for phone/laptop switching)
set-option -g window-size latest

# Large scrollback
set -g history-limit 50000

# Mouse support
set -g mouse on

# Start windows and panes at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape delay (faster vim mode switching)
set -sg escape-time 10

# Enable true color support
# - default-terminal sets TERM inside tmux panes (apps see this).
#   Must be tmux-256color / screen-256color, NEVER xterm-256color (anti-pattern).
# - terminal-features declares what the OUTER terminal supports.
#   xterm* matches both "xterm-256color" (Warp via SSH/Tailscale SSH)
#   AND plain "xterm" (the default docker exec TERM).
#   Without xterm* match, RGB escapes from apps get downgraded to 256-color.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ",screen*:RGB"
set -as terminal-features ",tmux*:RGB"

# Defensive: force COLORTERM=truecolor for new panes.
# docker exec strips it from the host env; OpenSSH AcceptEnv only allows LANG/LC_*
# so SSH also strips it unless explicitly whitelisted. Setting it here means
# TUIs that bypass terminfo (lipgloss/termenv/opencode) always detect 24-bit.
set-environment -g COLORTERM truecolor

# Defensive: force LANG=C.UTF-8 as the FALLBACK in tmux's global env.
# The container ships without a configured locale, so libc falls back to POSIX,
# where wcwidth() returns -1 for every multibyte codepoint (Braille spinners,
# Nerd-Font glyphs, emoji). tmux uses wcwidth() to track cursor columns across
# panes — under POSIX it miscalculates and corrupts wide-char rendering.
# Paired with update-environment below: client-supplied LANG (e.g. en_US.UTF-8
# from a Warp/macOS SSH session) overlays this global default in the session
# env, so user preference still wins. Global only kicks in when no upstream
# locale was supplied (docker exec, Tailscale SSH).
set-environment -g LANG C.UTF-8

# Whitelist locale vars in the per-session env update.
# Default value omits LANG/LC_*, which means a client SSH'd in with
# LANG=en_US.UTF-8 would have that preference silently downgraded to the
# global C.UTF-8 fallback above. Adding them to update-environment makes the
# client's locale flow into the session env (which overlays global env when
# constructing pane env). The rest of the list is the tmux default — keep in
# sync if upstream changes it (options-table.c GRID_DEFAULT_UPDATE_ENV).
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WAYLAND_DISPLAY WINDOWID XAUTHORITY LANG LC_ALL LC_CTYPE"

# Focus events for vim autoread and time-tracker hooks
set -g focus-events on

# Prevent bells from propagating across grouped sessions
set -g bell-action current

# Allow passthrough escape sequences (for terminal graphics, OSC queries, etc.)
set -g allow-passthrough on

# Enable OSC 52 clipboard (allows copy to work through SSH + tmux)
set -g set-clipboard on

# Extended keys: pass modifier combos to apps inside tmux (tmux 3.5+)
set -g extended-keys on

# ==============================================================================
# Key Bindings
# ==============================================================================

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move pane in direction (H/J/K/L)
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Resize pane (arrow keys, repeatable)
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Full-spanning splits (new pane spans full window height/width)
bind | split-window -fh -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"

# Force detach other clients (useful when switching devices)
bind D detach-client -a

# ==============================================================================
# Status Bar — clean and informative
# ==============================================================================

set -g status-style 'bg=#1a1b26 fg=#c0caf5'
set -g status-left-length 40
set -g status-left '#[fg=#7aa2f7,bold][#S] '
set -g status-right '#[fg=#9ece6a]%H:%M'
set -g window-status-current-style 'fg=#e0af68,bold'
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# Pane borders — subtle
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# ==============================================================================
# Plugins (TPM)
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# ==============================================================================
# Time-tracker hooks (pane focus → tt ingest)
# Four hooks cover all navigation paths; tt has built-in 500ms debounce
# Errors logged to ~/.local/state/time-tracker/hook.log
# ==============================================================================

set-hook -g pane-focus-in 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane \"#{pane_id}\" --cwd \"#{pane_current_path}\" --session \"#{session_name}\" --window \"#{window_index}\" 2>>$HOME/.local/state/time-tracker/hook.log"'
set-hook -g after-select-pane 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane \"#{pane_id}\" --cwd \"#{pane_current_path}\" --session \"#{session_name}\" --window \"#{window_index}\" 2>>$HOME/.local/state/time-tracker/hook.log"'
set-hook -g session-window-changed 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane \"#{pane_id}\" --cwd \"#{pane_current_path}\" --session \"#{session_name}\" --window \"#{window_index}\" 2>>$HOME/.local/state/time-tracker/hook.log"'
set-hook -g client-session-changed 'run-shell -b "mkdir -p $HOME/.local/state/time-tracker && tt ingest pane-focus --pane \"#{pane_id}\" --cwd \"#{pane_current_path}\" --session \"#{session_name}\" --window \"#{window_index}\" 2>>$HOME/.local/state/time-tracker/hook.log"'

# ==============================================================================
# Initialize TPM (keep at bottom)
# ==============================================================================

run '~/.tmux/plugins/tpm/tpm'
