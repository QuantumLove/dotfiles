[tools]
node = "22.22.3"
bun = "latest"
"npm:pnpm" = "latest"
python = "3.12"
age = "latest"
sops = "latest"
gitleaks = "latest"
tflint = "latest"
"asdf:virtualroot/asdf-opentofu" = "latest"
"asdf:asdf-community/asdf-kubectl" = "latest"
"asdf:sudermanjr/asdf-yq" = "latest"
"asdf:asdf-community/asdf-uv" = "latest"
"asdf:looztra/asdf-k9s" = "latest"
"asdf:MetricMike/asdf-awscli" = "latest"
"github:sjawhar/time-tracker" = { version = "latest", exe = "tt" }
# NB: opencode-ai, @anthropic-ai/claude-code, oh-my-openagent, @googleworkspace/cli,
# yarn are installed via npm-global in the Dockerfile rather than here, because
# mise's npm backend doesn't run postinstall scripts (needed for platform binaries).

[settings]
experimental = true
yes = true
lockfile = true

[env]
EDITOR = "vim"
