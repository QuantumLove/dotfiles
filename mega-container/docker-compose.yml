services:
  mega:
    build: .
    hostname: raf-dev
    init: true   # tini as PID 1 — reaps zombie children
    cap_add:
      - NET_ADMIN      # Required for Tailscale networking
      - SYS_MODULE     # May be needed for some network operations
    devices:
      - /dev/net/tun:/dev/net/tun  # TUN device for Tailscale
    environment:
      - OP_SERVICE_ACCOUNT_TOKEN
      - SSH_AUTH_SOCK=/ssh-agent
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
       # Tailscale state - persists identity across container rebuilds
       - tailscale-state:/var/lib/tailscale
       # Code directory - persistent workspace
       - code:/home/rafaelcarvalho/code
       # Docker socket for building images (connects to Docker Desktop VM)
       - /var/run/docker.sock:/var/run/docker.sock
       # SSH Agent forwarding via Docker Desktop magic path (works with 1Password or macOS agent)
       - /run/host-services/ssh-auth.sock:/ssh-agent:ro
       # AWS config and SSO cache from host (rw needed for SSO token refresh)
       - ~/.aws:/home/rafaelcarvalho/.aws
       # Kubernetes config from host (shares minikube/EKS contexts)
       - ~/.kube:/home/rafaelcarvalho/.kube
       # Hawk CLI config from host (shares auth tokens across host and container)
       - ~/.config/hawk-cli:/home/rafaelcarvalho/.config/hawk-cli
       # OpenCode state - persists database and session history across rebuilds
       - opencode-state:/home/rafaelcarvalho/.local/share/opencode
       # Tmux workspace snapshots - persists layout snapshots across rebuilds
       - opencode-snapshots:/home/rafaelcarvalho/.local/share/tmux-snapshots
       # chezmoi source from host (ro) - rebuilds apply local changes without a git push
       - ~/.local/share/chezmoi:/home/rafaelcarvalho/.local/share/chezmoi:ro
    restart: "on-failure:5"  # Max 5 restart attempts, then stops (prevents crash-loops)
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --json >/dev/null && pgrep sshd >/dev/null && pgrep -x cron >/dev/null && pgrep -f supercronic >/dev/null && curl -sf http://127.0.0.1:4096/ >/dev/null && claude --version >/dev/null && opencode --version >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  tailscale-state:
    # IMPORTANT: This volume persists Tailscale identity
    # Do NOT use 'docker compose down -v' or you'll need to re-authenticate
    # and may get a new hostname (raf-dev-1, raf-dev-2, etc.)
  code:
    # Persistent workspace for all code repositories
  opencode-state:
    # Persists OpenCode database, session history, logs
  opencode-snapshots:
    # Persists tmux workspace snapshots
