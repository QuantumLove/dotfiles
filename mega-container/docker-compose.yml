services:
  mega:
    build: .
    hostname: raf-dev
    cap_add:
      - NET_ADMIN      # Required for Tailscale networking
      - SYS_MODULE     # May be needed for some network operations
    devices:
      - /dev/net/tun:/dev/net/tun  # TUN device for Tailscale
    environment:
      - OP_SERVICE_ACCOUNT_TOKEN
      - SSH_AUTH_SOCK=/ssh-agent
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      # Tailscale state - persists identity across container rebuilds
      - tailscale-state:/var/lib/tailscale
      # Code directory - persistent workspace
      - code:/home/rafaelcarvalho/code
      # Docker socket for building images (connects to Docker Desktop VM)
      - /var/run/docker.sock:/var/run/docker.sock
      # SSH Agent forwarding via Docker Desktop magic path (works with 1Password or macOS agent)
      - /run/host-services/ssh-auth.sock:/ssh-agent:ro
      # AWS config and SSO cache from host (rw needed for SSO token refresh)
      - ~/.aws:/home/rafaelcarvalho/.aws
      # Kubernetes config from host (shares minikube/EKS contexts)
      - ~/.kube:/home/rafaelcarvalho/.kube
      # Hawk CLI config from host (shares auth tokens across host and container)
      - ~/.config/hawk-cli:/home/rafaelcarvalho/.config/hawk-cli
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  tailscale-state:
    # IMPORTANT: This volume persists Tailscale identity
    # Do NOT use 'docker compose down -v' or you'll need to re-authenticate
    # and may get a new hostname (raf-dev-1, raf-dev-2, etc.)
  code:
    # Persistent workspace for all code repositories
